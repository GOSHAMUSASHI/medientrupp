    <!-- Preloader inline style to prevent flash -->
    <style>
      #preloader {
        position: fixed; inset: 0; background: #030305;
        display: flex; align-items: center; justify-content: center;
        z-index: 99999; transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #preloader.done { opacity: 0; visibility: hidden; pointer-events: none; }
      .preloader-m {
        font-family: 'Outfit', sans-serif;
        font-size: 3rem; font-weight: 800;
        color: #A855F7; letter-spacing: 0.1em;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(0.95); }
      }
    </style>
  </head>
  <body>
    <div id="preloader">
      <div class="preloader-m">M</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var pre = document.getElementById('preloader');
          if (pre) pre.classList.add('done');
        }, 1200);
      });
    </script>
  </body>
</html>
